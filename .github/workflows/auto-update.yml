name: Auto-update curated places

on:
  schedule:
    # Every Sunday at 02:00 UTC (KST 11:00; adjust if needed)
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper processor
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: node scraper/processor.js

      - name: Commit and push if data changed
        run: |
          if git diff --quiet -- src/data/crawled_places.json; then
            echo "No changes detected in crawled_places.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Long scrapes can finish after other commits landed on master.
          # Put our generated file on top of the latest remote tip, then push with retries.
          MSG="Auto-update curated places"
          DATA_FILE="src/data/crawled_places.json"
          cp "$DATA_FILE" /tmp/crawled_places.generated.json

          for attempt in 1 2 3 4 5; do
            git fetch origin master
            git reset --hard origin/master
            cp /tmp/crawled_places.generated.json "$DATA_FILE"
            if git diff --quiet -- "$DATA_FILE"; then
              echo "Remote already has the same places content; nothing to push."
              exit 0
            fi
            git add "$DATA_FILE"
            git commit -m "$MSG"
            if git push origin HEAD:master; then
              echo "Pushed successfully (attempt ${attempt})"
              exit 0
            fi
            echo "Push race (attempt ${attempt}); retrying..."
            sleep $((attempt * 4))
          done
          echo "ERROR: failed to push after retries" >&2
          exit 1

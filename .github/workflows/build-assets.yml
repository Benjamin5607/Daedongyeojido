name: Build map links and photos

on:
  schedule:
    # 1st of each month at 04:00 UTC (after review refresh on the 15th)
    - cron: "0 4 1 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Re-resolve all map links"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Resolve map links
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          npm run build-map-links -- $FORCE_FLAG

      - name: Attach missing place photos
        run: npm run attach-images

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/place_map_links.json src/data/crawled_places.json
          if git diff --staged --quiet; then
            echo "No asset changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh map links and place photos"
          git push

name: Auto-update Google Maps reviews

on:
  schedule:
    # 15th of every month at 03:00 UTC (KST 12:00)
    # Existing place crawl runs every Sunday 02:00 UTC — kept on a different day/time.
    - cron: "0 3 15 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Re-fetch reviews even when cached"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      limit:
        description: "Max places to scrape (empty = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scrape-reviews-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Scrape Google Maps reviews
        env:
          REVIEWS_PER_PLACE: "5"
          PLACE_DELAY_MS: "1200"
        run: |
          ARGS=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.limit }}" ]; then
            ARGS+=(--limit="${{ inputs.limit }}")
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          npm run scrape-reviews -- "${ARGS[@]}"

      - name: Commit and push if reviews changed
        run: |
          if git diff --quiet -- src/data/place_reviews.json; then
            echo "No changes detected in place_reviews.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/place_reviews.json
          git commit -m "Auto-update Google Maps reviews ($(date -u +%Y-%m))"
          git push
